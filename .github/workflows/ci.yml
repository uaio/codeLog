name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @codelog/types --filter @codelog/server --filter @codelog/sdk run build
      - run: pnpm --filter @codelog/web run build
      - run: pnpm --filter @codelog/mcp --filter @codelog/cli run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @codelog/types --filter @codelog/server --filter @codelog/sdk run build
      - run: pnpm --filter @codelog/web run build
      - run: pnpm --filter @codelog/mcp --filter @codelog/cli run build
      - run: pnpm --filter @codelog/server --filter @codelog/mcp --filter @codelog/cli --filter @codelog/sdk test
